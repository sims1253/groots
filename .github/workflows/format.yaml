name: format

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  air-format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - name: Install air
        run: install.packages("air", repos = c(positdev = "https://posit-dev.r-universe.dev", CRAN = "https://cloud.r-project.org"))
        shell: Rscript {0}
      - name: Check formatting
        run: air::check_format(".")
        shell: Rscript {0}
