name: lint

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - name: Install jarl
        run: install.packages("jarl", repos = c(positdev = "https://posit-dev.r-universe.dev", CRAN = "https://cloud.r-project.org"))
        shell: Rscript {0}
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::lintr
          needs: lint
      - name: Lint package with jarl
        run: jarl::lint_package()
        shell: Rscript {0}
      - name: Lint package with lintr
        run: lintr::lint_package()
        shell: Rscript {0}
